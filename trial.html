<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMURAI TaskFlow — トライアル</title>
    <script type="module" crossorigin src="/vibe-site/assets/trial-BO-nJF5w.js"></script>
    <link rel="modulepreload" crossorigin href="/vibe-site/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/vibe-site/assets/trial-BX8UzEHd.css">
  </head>
  <body>

    <header class="app-header">
      <div class="app-header-inner">
        <div class="app-header-left">
          <a href="./" class="back-link">← サイトに戻る</a>
          <span class="app-logo">SAMURAI TaskFlow</span>
          <span class="trial-badge">無料トライアル</span>
        </div>
        <div class="app-header-right">
          <button class="btn btn-sm btn-outline" id="clearAllBtn">全てクリア</button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="board-header">
        <h1 class="board-title">プロジェクトボード</h1>
        <p class="board-desc">タスクを追加して、ドラッグまたはボタンで列間を移動できます。データはブラウザに保存されます。</p>
      </div>

      <!-- タスク追加フォーム -->
      <div class="add-task-bar">
        <input
          type="text"
          id="newTaskInput"
          class="task-input"
          placeholder="新しいタスクを入力... (例: ランディングページのデザイン修正)"
          maxlength="80"
        />
        <select id="newTaskPriority" class="priority-select">
          <option value="high">高</option>
          <option value="medium" selected>中</option>
          <option value="low">低</option>
        </select>
        <select id="newTaskTag" class="tag-select">
          <option value="design">デザイン</option>
          <option value="dev">開発</option>
          <option value="marketing">マーケ</option>
          <option value="other">その他</option>
        </select>
        <button class="btn btn-primary" id="addTaskBtn">追加</button>
      </div>

      <!-- カンバンボード -->
      <div class="kanban-board" id="kanbanBoard">

        <div class="kanban-column" data-col="todo">
          <div class="col-header">
            <span class="col-dot col-dot--todo"></span>
            <span class="col-title">未着手</span>
            <span class="col-count" id="count-todo">0</span>
          </div>
          <div class="task-list" id="list-todo" data-col="todo"></div>
        </div>

        <div class="kanban-column" data-col="inprogress">
          <div class="col-header">
            <span class="col-dot col-dot--inprogress"></span>
            <span class="col-title">進行中</span>
            <span class="col-count" id="count-inprogress">0</span>
          </div>
          <div class="task-list" id="list-inprogress" data-col="inprogress"></div>
        </div>

        <div class="kanban-column" data-col="done">
          <div class="col-header">
            <span class="col-dot col-dot--done"></span>
            <span class="col-title">完了</span>
            <span class="col-count" id="count-done">0</span>
          </div>
          <div class="task-list" id="list-done" data-col="done"></div>
        </div>

      </div>
    </main>

  </body>
</html>
